name: Production backend verification

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "web/**"
      - "ops/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - "nginx.conf"
      - ".env.example"
      - ".github/workflows/production-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - "web/**"
      - "ops/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - "nginx.conf"
      - ".env.example"
      - ".github/workflows/production-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wireless_canvas
          POSTGRES_USER: wireless_canvas
          POSTGRES_PASSWORD: integration-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wireless_canvas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: server
    env:
      NODE_ENV: test
      PORT: 3100
      DATABASE_URL: postgres://wireless_canvas:integration-postgres-password@127.0.0.1:5432/wireless_canvas
      REDIS_URL: redis://127.0.0.1:6379
      SESSION_COOKIE_NAME: wireless_canvas_session
      SESSION_TTL_SECONDS: 28800
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_DISPLAY_NAME: Integration Admin
      BOOTSTRAP_ADMIN_PASSWORD: AdminStart2026
      MFA_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      PROVIDER_ENCRYPTION_KEY: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
      TASK_MOCK_MODE: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test
      - name: Run PostgreSQL and Redis identity integration
        shell: bash
        run: |
          set -euo pipefail
          bun src/migrate.ts
          bun src/bootstrap.ts
          bun src/index.ts >/tmp/wireless-canvas-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true; cat /tmp/wireless-canvas-api.log' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3100/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "API did not become healthy" >&2
              exit 1
            fi
            sleep 1
          done
          RUN_INTEGRATION_TESTS=true bun test tests/integration/identity-rbac.integration.test.ts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test

  compose-recovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure isolated production-like stack
        shell: bash
        run: |
          cat >.env <<'EOF'
          POSTGRES_PASSWORD=compose-postgres-password
          NODE_ENV=production
          PORT=3100
          SESSION_COOKIE_NAME=wireless_canvas_session
          SESSION_TTL_SECONDS=28800
          TRUST_PROXY=true
          BOOTSTRAP_ADMIN_USERNAME=admin
          BOOTSTRAP_ADMIN_DISPLAY_NAME=Compose Admin
          BOOTSTRAP_ADMIN_PASSWORD=ComposeAdmin2026
          MFA_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          PROVIDER_ENCRYPTION_KEY=AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
          WORKER_CONCURRENCY=40
          TASK_MOCK_MODE=true
          S3_ENDPOINT=http://minio:9000
          S3_REGION=us-east-1
          S3_BUCKET=wireless-canvas
          S3_ACCESS_KEY_ID=wireless-canvas
          S3_SECRET_ACCESS_KEY=compose-object-storage-password
          S3_FORCE_PATH_STYLE=true
          WECOM_CORP_ID=
          WECOM_AGENT_ID=
          WECOM_SECRET=
          WECOM_CALLBACK_URL=
          EOF
          docker compose config --quiet
      - name: Build and start the full stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --build
      - name: Verify web and API health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Full stack did not become healthy" >&2
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:3000/ | grep -q '<div id="root">'
      - name: Insert database recovery marker
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas \
            -c "INSERT INTO departments(name,code) VALUES('Recovery Marker','recovery-marker')"
      - name: Create one-shot database backup
        shell: bash
        run: |
          set -euo pipefail
          set +e
          backup_output=$(docker compose run --rm --no-deps \
            -e BACKUP_RUN_ONCE=true -e BACKUP_STAMP=ci-recovery backup 2>&1)
          backup_status=$?
          set -e
          printf '%s\n' "$backup_output"
          if [ "$backup_status" -ne 0 ]; then
            annotation=${backup_output//'%'/'%25'}
            annotation=${annotation//$'\r'/'%0D'}
            annotation=${annotation//$'\n'/'%0A'}
            echo "::error title=One-shot backup failed::$annotation"
            exit "$backup_status"
          fi
      - name: Verify backup object exists
        shell: bash
        run: |
          set -euo pipefail
          docker compose run --rm --no-deps --entrypoint /bin/sh minio-init -c \
            'mc alias set local http://minio:9000 "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY" >/dev/null && mc stat "local/$S3_BUCKET/backups/postgres/ci-recovery.dump"'
      - name: Restore the backup and verify recovered data
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas \
            -c "DELETE FROM departments WHERE code='recovery-marker'"
          docker compose stop web api worker backup
          docker compose run --rm --no-deps backup restore.sh "backups/postgres/ci-recovery.dump"
          restored=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc \
            "SELECT COUNT(*) FROM departments WHERE code='recovery-marker'")
          test "$restored" = "1"
      - name: Verify API after recovery
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d api worker web
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not recover after database restore" >&2
          exit 1
      - name: Prepare 40 isolated designer sessions
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T redis redis-cli FLUSHDB
          docker compose exec -T api bun tests/load/prepare-40-sessions.ts
          docker compose cp api:/tmp/load-config.json /tmp/load-config.json
          test "$(jq '.sessionCookies | length' /tmp/load-config.json)" = "40"
      - name: Run 40-designer submission load test
        shell: bash
        run: |
          set -euo pipefail
          model_config_id=$(jq -r '.modelConfigId' /tmp/load-config.json)
          session_cookies=$(jq -c '.sessionCookies' /tmp/load-config.json)
          docker run --rm --network host \
            -e BASE_URL=http://127.0.0.1:3000 \
            -e MODEL_CONFIG_ID="$model_config_id" \
            -e SESSION_COOKIES="$session_cookies" \
            -v "$PWD:/work:ro" \
            grafana/k6:2.0.0 run /work/ops/load/k6-40-submitters.js
      - name: Verify queue, billing and generated assets after load
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 180); do
            pending=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc \
              "SELECT COUNT(*) FROM tasks WHERE status IN ('waiting','processing')")
            if [ "$pending" = "0" ]; then
              break
            fi
            if [ "$attempt" -eq 180 ]; then
              echo "Task queue did not drain within 6 minutes; pending=$pending" >&2
              exit 1
            fi
            sleep 2
          done

          submitted=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM tasks")
          designers=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(DISTINCT user_id) FROM tasks")
          failed=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM tasks WHERE status<>'success'")
          captured=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM credit_reservations WHERE status='captured'")
          held=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM credit_reservations WHERE status='held'")
          assets=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM assets WHERE status='ready' AND source='generation'")
          history=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM generation_history WHERE status='success'")
          negative_balances=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM users WHERE credit_balance<0")
          duplicate_requests=$(docker compose exec -T postgres psql -U wireless_canvas -d wireless_canvas -Atc "SELECT COUNT(*) FROM (SELECT request_id FROM tasks GROUP BY request_id HAVING COUNT(*)>1) duplicates")

          printf 'submitted=%s designers=%s failed=%s captured=%s held=%s assets=%s history=%s negative_balances=%s duplicate_requests=%s\n' \
            "$submitted" "$designers" "$failed" "$captured" "$held" "$assets" "$history" "$negative_balances" "$duplicate_requests"
          test "$submitted" -ge 1000
          test "$designers" = "40"
          test "$failed" = "0"
          test "$captured" = "$submitted"
          test "$held" = "0"
          test "$assets" = "$submitted"
          test "$history" = "$submitted"
          test "$negative_balances" = "0"
          test "$duplicate_requests" = "0"
      - name: Verify cross-account task history and asset isolation
        shell: bash
        run: docker compose exec -T api bun tests/integration/verify-data-isolation.ts
      - name: Print logs and remove test stack
        if: always()
        shell: bash
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=200 || true
          docker compose down --volumes --remove-orphans || true
