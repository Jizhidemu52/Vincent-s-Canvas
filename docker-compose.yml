services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: wireless-canvas-web:local
    container_name: wireless-canvas-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://wireless_canvas:${POSTGRES_PASSWORD}@postgres:5432/wireless_canvas
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["bun", "src/worker.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://wireless_canvas:${POSTGRES_PASSWORD}@postgres:5432/wireless_canvas
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wireless_canvas
      POSTGRES_USER: wireless_canvas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wireless_canvas"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY && mc mb --ignore-existing local/$$S3_BUCKET && mc version enable local/$$S3_BUCKET"]
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-wireless-canvas}
  backup:
    build:
      context: .
      dockerfile: ops/backup/Dockerfile
    environment:
      DATABASE_URL: postgres://wireless_canvas:${POSTGRES_PASSWORD}@postgres:5432/wireless_canvas
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-wireless-canvas}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      BACKUP_INTERVAL_SECONDS: 900
      BACKUP_RETENTION_DAYS: 30
    depends_on:
      api:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
  minio-data:
